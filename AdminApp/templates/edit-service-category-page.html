{% extends 'base.html' %}
{% load static %}
{% block title %}FixPoint - Service Category Edit Form{% endblock %}

{% block content %}

<div class="content-wrapper">

  <div class="row">
    <div class="col-12">
      <h3 class="mb-4 font-weight-bold">Service Categories Edit Form</h3>
    </div>
  </div>

  <div class="row">
    <div class="col-lg-12 grid-margin">
      <div class="card">
        <div class="card-body">

          <form class="forms-sample" method="post" action="{% url 'update_service_category' category_id=category.id %}"
          enctype="multipart/form-data" >
            {% csrf_token %}

            <div class="form-group">
              <label class="font-weight-bold">Category Name</label>
              <input type="text" class="form-control" name="category_name" placeholder="Plumber, Electrician, Painter"
                required value="{{category.category_name}}">
            </div>

            <div class="form-group">
              <label class="font-weight-bold">Category Description</label>
              <textarea class="form-control" name="category_description" rows="3"
                placeholder="Short description about the service">{{category.category_description}}</textarea>
            </div>

            <div class="form-group">
              <label class="font-weight-bold">Category Image</label>

              <!-- Existing / Preview Image -->
              <div class="mb-2">
                {% if category.category_image %}
                <img id="imagePreview" src="{{ category.category_image.url }}" style="width:120px; height:120px; object-fit:cover;
                  border-radius:8px; border:1px solid #ddd;">
                {% else %}
                <img id="imagePreview" style="display:none; width:120px; height:120px; object-fit:cover;
                  border-radius:8px; border:1px solid #ddd;">
                {% endif %}
              </div>

              <!-- Hidden file input -->
              <input type="file" id="categoryImage" name="category_image" accept="image/*" onchange="previewImage()"
                hidden>

              <!-- Styled button (same style) -->
              <label for="categoryImage" id="imageButton" class="btn btn-sm btn-outline-primary"
                style="max-width:140px;">
                {% if category.category_image %}
                Change Image
                {% else %}
                Choose Image
                {% endif %}
              </label>
            </div>


            <div class="form-group">
              <div class="custom-control custom-checkbox">
                <input type="checkbox" class="custom-control-input" id="isActive" name="is_active"
                {% if category.is_active %}checked{% endif %}>
                <label class="custom-control-label font-weight-bold" for="isActive">
                  Activate Category
                </label>
              </div>
            </div>


            <button type="submit" class="btn btn-gradient-primary mr-2">
              Update
            </button>
            <button type="reset" class="btn btn-light">
              Cancel
            </button>

          </form>

        </div>
      </div>
    </div>
  </div>

</div>

<script>
  function previewImage() {
    const input = document.getElementById('categoryImage');
    const preview = document.getElementById('imagePreview');
    const button = document.getElementById('imageButton');

    if (input.files && input.files[0]) {
      const reader = new FileReader();

      reader.onload = function (e) {
        preview.src = e.target.result;
        preview.style.display = 'block';
        button.innerText = 'Change Image';
      };

      reader.readAsDataURL(input.files[0]);
    }
  }
</script>


{% endblock %}
