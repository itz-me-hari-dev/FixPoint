<!DOCTYPE html>
{% load static %}
<html lang="en">

<head>
  <!-- Required meta tags -->
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, shrink-to-fit=no">
  <title>Purple Admin</title>
  <!-- plugins:css -->
  <link rel="stylesheet" href="{% static 'admin_app_assets/vendors/mdi/css/materialdesignicons.min.css' %}">
  <link rel="stylesheet" href="{% static 'admin_app_assets/vendors/ti-icons/css/themify-icons.css' %}">
  <link rel="stylesheet" href="{% static 'admin_app_assets/vendors/css/vendor.bundle.base.css' %}">
  <link rel="stylesheet" href="{% static 'admin_app_assets/vendors/font-awesome/css/font-awesome.min.css' %}">
  <!-- endinject -->
  <!-- Plugin css for this page -->
  <!-- End plugin css for this page -->
  <!-- inject:css -->
  <!-- endinject -->
  <!-- Layout styles -->
  <link rel="stylesheet" href="{% static 'admin_app_assets/css/style.css' %}">
  <!-- End layout styles -->
  <link rel="shortcut icon" href="{% static 'admin_app_assets/images/favicon.png' %}" />
</head>

<body>
  <div class="container-scroller">
    <div class="container-fluid page-body-wrapper full-page-wrapper">
      <div class="content-wrapper d-flex align-items-center auth">
        <div class="row flex-grow">
          <div class="col-lg-4 mx-auto">
            <div class="auth-form-light text-left p-5">
              <div class="text-center">
                <h1>FixPoint Admin</h1>
                <h2>Login</h2>
              </div>
              <h6 class="font-weight-light">Login in to continue.</h6>
              <form class="pt-3" method="POST">
                {% csrf_token %}

                <div class="form-group">
                  <input type="text" class="form-control form-control-lg" placeholder="Username" name="admin_username"
                    required>
                </div>

                <div class="form-group">
                  <input type="password" class="form-control form-control-lg" placeholder="Password"
                    name="admin_password" required>
                </div>

                <div class="mt-3 d-grid gap-2">
                  <button type="submit"
                    class="btn btn-block btn-gradient-primary btn-lg font-weight-medium auth-form-btn">
                    SIGN IN
                  </button>
                </div>

                {% if messages %}
                {% for message in messages %}
                <div class="alert alert-danger mt-3">
                  {{ message }}
                </div>
                {% endfor %}
                {% endif %}

              </form>

            </div>
          </div>
        </div>
      </div>
      <!-- content-wrapper ends -->
    </div>
    <!-- page-body-wrapper ends -->
  </div>
  <!-- container-scroller -->
  <!-- plugins:js -->
  <script src="{% static 'admin_app_assets/vendors/js/vendor.bundle.base.js' %}"></script>
  <!-- endinject -->
  <!-- Plugin js for this page -->
  <!-- End plugin js for this page -->
  <!-- inject:js -->
  <script src="{% static 'admin_app_assets/js/off-canvas.js' %}"></script>
  <script src="{% static 'admin_app_assets/js/misc.js' %}"></script>
  <script src="{% static 'admin_app_assets/js/settings.js' %}"></script>
  <script src="{% static 'admin_app_assets/js/todolist.js' %}"></script>
  <script src="{% static 'admin_app_assets/js/jquery.cookie.js' %}"></script>
  <!-- endinject -->
</body>

</html>
