{% extends 'base.html' %}
{% load static %}
{% block title %}FixPoint - Service Category Form{% endblock %}

{% block content %}

<div class="content-wrapper">

  <div class="row">
    <div class="col-12">
      <h3 class="mb-4 font-weight-bold">Service Categories Form</h3>
    </div>
  </div>

  <div class="row">
    <div class="col-lg-12 grid-margin">
      <div class="card">
        <div class="card-body">

          <form class="forms-sample" method="post" action="{% url 'save_service_category' %}">
            {% csrf_token %}

            <div class="form-group">
              <label class="font-weight-bold">Category Name</label>
              <input type="text" class="form-control" name="category_name" placeholder="Plumber, Electrician, Painter"
                required>
            </div>

            <div class="form-group">
              <label class="font-weight-bold">Category Description</label>
              <textarea class="form-control" name="category_description" rows="3"
                placeholder="Short description about the service"></textarea>
            </div>

            <!-- Category Image -->
            <div class="form-group">
              <label class="font-weight-bold">Category Image</label>

              <!-- Image Preview -->
              <div class="mb-2">
                <img id="imagePreview" style="display:none; width:120px; height:120px;
                object-fit:cover; border-radius:8px; border:1px solid #ddd;">
              </div>

              <!-- REAL FILE INPUT (hidden) -->
              <input type="file" id="categoryImage" name="category_image" accept="image/*" onchange="previewImage()"
                hidden>

              <!-- BUTTON (styled exactly like others) -->
              <label for="categoryImage" id="imageButton" class="btn btn-sm btn-outline-primary"
                style="max-width: 140px;">
                Choose Image
              </label>
            </div>


            <div class="form-group">
              <div class="custom-control custom-checkbox">
                <input type="checkbox" class="custom-control-input" id="isActive" name="is_active" checked>
                <label class="custom-control-label font-weight-bold" for="isActive">
                  Activate Category
                </label>
              </div>
            </div>

            <button type="submit" class="btn btn-gradient-primary mr-2">
              Save
            </button>
            <button type="reset" class="btn btn-light">
              Cancel
            </button>

          </form>

        </div>
      </div>
    </div>
  </div>

</div>

<script>
function previewImage() {
  const input = document.getElementById('categoryImage');
  const preview = document.getElementById('imagePreview');
  const button = document.getElementById('imageButton');

  if (input.files && input.files[0]) {
    const reader = new FileReader();

    reader.onload = function (e) {
      preview.src = e.target.result;
      preview.style.display = 'block';
      button.innerText = 'Change Image';   // 👈 SAME button, new text
    };

    reader.readAsDataURL(input.files[0]);
  }
}
</script>




{% endblock %}
